<div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="registerModalLabel">Cadastro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form>
                    <!-- Nome -->
                    <div class="input-group mb-3">
                        <span class="my-modalCadastro-icones input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" id="nomeCadastroInput" class="form-control form-control-sm"
                            placeholder="Nome" />
                    </div>

                    <!-- Email -->
                    <div class="input-group mb-3">
                        <span class="my-modalCadastro-icones input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="loginCadastro" class="form-control form-control-sm"
                            placeholder="Email" />
                    </div>

                    <!-- Senha -->
                    <div class="input-group mb-3">
                        <span class="my-modalCadastro-icones input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="passwordCadastroInput" class="form-control form-control-sm"
                            placeholder="Senha" />
                        <button class="my-modalCadastro-icones btn btn-outline-secondary" type="button" id="toggleRegisterPassword">
                            <i class="fas fa-eye" id="registerEyeIcon"></i>
                        </button>
                    </div>

                    <!-- Problema -->
                    <div class="input-group mb-3">
                        <span class="my-modalCadastro-icones input-group-text"><i class="fas fa-stethoscope"></i></span>
                        <input type="text" id="problemaInput" class="form-control form-control-sm"
                            placeholder="Problema (ex: dor no joelho, dor no tendão)" />
                    </div>

                    <!-- Descrição do Problema -->
                    <div class="input-group mb-3">
                        <span class="my-modalCadastro-icones input-group-text"><i class="fas fa-comment"></i></span>
                        <textarea id="descricaoProblemaInput" class="form-control form-control-sm"
                            placeholder="Descreva o problema"></textarea>
                    </div>

                    <!-- Idade -->
                    <div class="input-group mb-3">
                        <span class="my-modalCadastro-icones input-group-text"><i class="fas fa-user-clock"></i></span>
                        <input type="number" id="idadeInput" class="form-control form-control-sm" placeholder="Idade" />
                    </div>

                    <!-- Btn Cadastrar -->
                    <button type="button" class="my-modalCadastro-btnCadastrar">CADASTRAR</button>

                    <!-- Linha Horizontal -->
                    <hr class="my-modalCadastro-hr">

                    <!-- Já tem conta -->
                    <div class="text-center">
                        <p class="mb-1">Já tem conta?
                            <a class="my-modalCadastro-cliqueAqui" href="#" data-bs-toggle="modal" data-bs-target="#loginModal"
                                data-bs-dismiss="modal"> Clique aqui</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
