<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Header -->
            <div class="modal-header">
                <h5 class="modal-title" id="loginModalLabel">Login</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <!-- Body -->
            <div class="modal-body">
                <form>
                    
                    <!-- Email -->
                    <div class="input-group mb-3">
                        <span class="my-modalLogin-icones input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="loginEmail" class="form-control form-control-sm" placeholder="Email" />
                    </div>

                    <!-- Senha -->
                    <div class="input-group mb-3">
                        <span class="my-modalLogin-icones input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="loginPassword" class="form-control form-control-sm"
                            placeholder="Senha" />
                        <button class="my-modalLogin-icones btn btn-outline-secondary" type="button" id="toggleLoginPassword">
                            <i class="fas fa-eye" id="loginEyeIcon"></i>
                        </button>
                    </div>

                    <!-- Btn Entrar -->
                    <button type="button" class="my-modalLogin-btnEntrar">ENTRAR</button>

                    <!-- Linha horizontal -->
                    <hr class="my-modalLogin-hr">

                    <!-- Ainda não tem conta ? -->
                    <div class="text-center">
                        <p class="mb-1">Ainda não tem conta?
                            <a class="my-modalLogin-cliqueAqui" href="#" data-bs-toggle="modal" data-bs-target="#registerModal" data-bs-dismiss="modal"> Clique aqui</a>
                        </p>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
