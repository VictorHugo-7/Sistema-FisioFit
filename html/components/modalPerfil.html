<!-- Modal do Perfil -->
<div class="modal fade" id="perfilModal" tabindex="-1" aria-labelledby="perfilModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="perfilModalLabel">Meu Perfil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center">
                    <!-- Imagem do Perfil -->
                    <div class="me-3">
                        <img src="https://cdn-icons-png.flaticon.com/128/4625/4625826.png" alt="Foto do Perfil" class="rounded-circle" width="100" height="100">
                    </div>
                    <!-- Informações do Perfil -->
                    <div>
                        <h5 id="perfilNome">Nome do Usuário</h5>
                        <p><strong>Problema:</strong> <span id="perfilProblema">Problema do Usuário</span></p>
                        <p><strong>Descrição:</strong> <span id="perfilDescricao">Descrição do Usuário</span></p>
                        <p><strong>Email:</strong> <span id="perfilEmail">usuario@example.com</span></p>
                        <p><strong>Idade:</strong> <span id="perfilIdade">30 anos</span></p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <!-- Botão de Editar -->
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editarPerfilModal">
                    <i class="fa-solid fa-pen-to-square"></i> Editar
                </button>
                <!-- Botão de Sair -->
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                    <i class="fa-solid fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Edição do Perfil -->
<div class="modal fade" id="editarPerfilModal" tabindex="-1" aria-labelledby="editarPerfilModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editarPerfilModalLabel">Editar Perfil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formEditarPerfil">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" placeholder="Nome do Usuário">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="problema" class="form-label">Problema</label>
                            <input type="text" class="form-control" id="problema" placeholder="Problema do Usuário">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="usuario@example.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="idade" class="form-label">Idade</label>
                            <input type="number" class="form-control" id="idade" placeholder="30">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label for="descricao" class="form-label">Descrição</label>
                            <textarea class="form-control" id="descricao" placeholder="Descrição do Usuário"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="foto" class="form-label">Alterar Foto</label>
                            <input type="file" class="form-control" id="foto">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="salvarAlteracoes">Salvar Alterações</button>
            </div>
        </div>
    </div>
</div>
